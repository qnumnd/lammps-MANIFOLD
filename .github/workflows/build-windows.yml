name: Build LAMMPS for Windows (MS-MPI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install MS-MPI
        uses: mpi4py/setup-mpi@v1
          
      - name: Setup Boost
        uses: MarkusJx/install-boost@v2
        id: install-boost
        with:
          boost_version: 1.89.0
          platform_version: 2025
          toolset: msvc
          
      - name: Download LAMMPS
        run: |
          curl -L https://download.lammps.org/tars/lammps-22Jul2025_update4.tar.gz -o lammps.tar.gz
          tar -xzf lammps.tar.gz
          
      - name: Replace MANIFOLD package
        run: |
          Remove-Item -Path lammps-22Jul2025/src/MANIFOLD -Recurse -Force
          Copy-Item -Path MANIFOLD -Destination lammps-22Jul2025/src/MANIFOLD -Recurse
          Copy-Item -Path cmake_patches/CMakeLists.txt -Destination lammps-22Jul2025/cmake/CmakeLists.txt -Force
          
      - name: Configure LAMMPS
        run: |
          cmake -S ./lammps-22Jul2025/cmake -B build `
            -C ./lammps-22Jul2025/cmake/presets/basic.cmake `
            -D BUILD_MPI=yes `
            -D BUILD_OMP=yes `
            -D PKG_FEP=on `
            -D PKG_MANIFOLD=on `
            -D BOOST_ROOT=${{steps.install-boost.outputs.BOOST_ROOT}} `
            -D CMAKE_BUILD_TYPE=Release
        env:
          BOOST_ROOT: ${{ steps.install-boost.outputs.BOOST_ROOT }}
          
          
      - name: Build LAMMPS
        run: |
          cd build
          cmake --build . --config Release -j $env:NUMBER_OF_PROCESSORS
          
      - name: Package binaries
        run: |
          cp build/Release/lmp.exe lmp_msmpi.exe
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lmp_msmpi.exe
          path: lmp_msmpi.exe
          retention-days: 90
          
      - name: Release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          files: lmp_msmpi.exe